<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CompTIA A+ 220-1201 — Study Hub</title>
  <meta name="description" content="CompTIA A+ 220-1201 study modules, quizzes, and midterm." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --text: #1a1814;
      --muted: #7a756c;
      --border: #e8e4de;
      --accent: #1a1814;
      --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --max: 960px;
      --radius: 4px;
    }
    [data-theme="dark"] {
      --bg: #0f0e0c;
      --surface: #171612;
      --text: #f0ece4;
      --muted: #8a8578;
      --border: #2a2820;
      --accent: #f0ece4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklab, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
    }
    .topbar {
      max-width: var(--max); margin: 0 auto;
      padding: 0 32px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand {
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--text); opacity: .85;
    }
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      display: grid; place-items: center;
      transition: border-color .2s, color .2s;
      font-family: var(--font-sans);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theme-toggle svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Hero ── */
    .hero {
      max-width: var(--max); margin: 0 auto;
      padding: 80px 32px 64px;
      border-bottom: 1px solid var(--border);
    }
    .hero-kicker {
      font-size: 11px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .hero-kicker::before {
      content: '';
      display: block; width: 24px; height: 1px;
      background: var(--muted);
    }
    .hero h2 {
      font-family: var(--font-serif);
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -.01em;
      color: var(--text);
      max-width: 680px;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 16px; color: var(--muted);
      max-width: 480px; line-height: 1.7;
    }

    /* ── Main content ── */
    .wrap {
      max-width: var(--max); margin: 0 auto;
      padding: 48px 32px 72px;
    }

    /* ── Section dividers ── */
    .section {
      margin-bottom: 52px;
    }
    .section-label {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 24px;
    }
    .section-label span {
      font-size: 10px; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }
    .section-rule {
      flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── Footer ── */
    footer {
      max-width: var(--max); margin: 0 auto;
      padding: 24px 32px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted); letter-spacing: .04em;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 20px; }
      .hero { padding: 48px 20px 40px; }
      .wrap { padding: 36px 20px 56px; }
      footer { padding: 20px; }
    }
    @media print { header { display: none; } }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand">CompTIA A+ · 220-1201</div>
    <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24"><path d="M12 18a6 6 0 110-12 6 6 0 010 12zm0-2a4 4 0 100-8 4 4 0 000 8zm0-10V2m0 20v-4M4.22 4.22l2.83 2.83m9.9 9.9 2.83 2.83M2 12h4m16 0h-4M4.22 19.78l2.83-2.83m9.9-9.9 2.83-2.83"/></svg>
    </button>
  </div>
</header>

<main>

  <div class="hero">
    <div class="hero-kicker">Study Hub</div>
    <h2>Everything you need to pass the A+ exam.</h2>
    <p>Structured modules, practice quizzes, and a midterm — all in one place. Study at your own pace.</p>
  </div>

  <div class="wrap">

    <div class="section">
      <div class="section-label">
        <span>Study Modules</span>
        <div class="section-rule"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span>Practice Quizzes</span>
        <div class="section-rule"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">
        <span>Assessment</span>
        <div class="section-rule"></div>
      </div>
    </div>

  </div>

</main>

<footer>
  <span>CompTIA A+ 220-1201 · Study Hub</span>
  <span id="year"></span>
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
  const btn = document.getElementById("themeBtn");
  const saved = localStorage.getItem("kb_theme");
  if (saved === "light" || saved === "dark") {
    document.documentElement.setAttribute("data-theme", saved);
  }
  btn.addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme") || "dark";
    const next = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("kb_theme", next);
  });
</script>
</body>
</html>
